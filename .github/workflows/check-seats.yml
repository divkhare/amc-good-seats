name: Check AMC Seats

on:
  push:
    branches: [main]
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Widen seat zone (any row, cols 1-100) to verify pipeline"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node amc-node.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TEST_MODE: ${{ inputs.test_mode }}
